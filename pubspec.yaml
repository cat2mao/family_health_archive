name: family_health_archive
description: 家庭健康档案 - 管理家人与宠物的就诊记录、健康数据与用药提醒
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  intl: ^0.20.2
  image_picker: ^1.1.2
  go_router: ^14.6.2
  fl_chart: ^0.70.2
  flutter_image_compress: ^2.3.0
  flutter_local_notifications: ^18.0.1
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  google_mlkit_text_recognition: ^0.14.0
  http: ^1.2.2
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "tubiao.png"
  adaptive_icon_background: "#4DB6AC"
  adaptive_icon_foreground: "tubiao.png"

flutter:
  uses-material-design: true
